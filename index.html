<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Interactive Been Map for the United States</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.tailwindcss.com?plugins=forms"></script>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://unpkg.com/lucide-react@latest"></script>
</head>
<body class="bg-slate-950 text-slate-100">
    <div id="root"></div>

    <script type="text/babel">
        // Fetch React hooks globally so you don't need 'import' statements
        const { useState, useEffect, useRef } = React;

        // Fetch Lucide Icons safely from the React variant
        const { 
          Download, Share2, Sparkles, MapPin, Sliders, Calendar, Edit3, Filter, 
          CheckCircle2, Grid, Trash2, Settings, Plus, Minus, Info, Lock, 
          Unlock, BookOpen, Heart, Globe, Award, Search, Check, Copy, 
          ChevronRight, RefreshCw, Sun, Moon 
        } = lucideReact;

        // Static configuration defaults
        const STATES_DATA = [
          { id: 'AK', name: 'Alaska', col: 0, row: 0, region: 'West' },
          { id: 'ME', name: 'Maine', col: 11, row: 0, region: 'Northeast' },
          { id: 'WA', name: 'Washington', col: 1, row: 1, region: 'West' },
          { id: 'ID', name: 'Idaho', col: 2, row: 1, region: 'West' },
          { id: 'MT', name: 'Montana', col: 3, row: 1, region: 'West' },
          { id: 'ND', name: 'North Dakota', col: 4, row: 1, region: 'Midwest' },
          { id: 'MN', name: 'Minnesota', col: 5, row: 1, region: 'Midwest' },
          { id: 'WI', name: 'Wisconsin', col: 6, row: 1, region: 'Midwest' },
          { id: 'MI', name: 'Michigan', col: 8, row: 1, region: 'Midwest' },
          { id: 'NY', name: 'New York', col: 9, row: 1, region: 'Northeast' },
          { id: 'VT', name: 'Vermont', col: 10, row: 1, region: 'Northeast' },
          { id: 'NH', name: 'New Hampshire', col: 11, row: 1, region: 'Northeast' },
          { id: 'OR', name: 'Oregon', col: 1, row: 2, region: 'West' },
          { id: 'NV', name: 'Nevada', col: 2, row: 2, region: 'West' },
          { id: 'WY', name: 'Wyoming', col: 3, row: 2, region: 'West' },
          { id: 'SD', name: 'South Dakota', col: 4, row: 2, region: 'Midwest' },
          { id: 'IA', name: 'Iowa', col: 5, row: 2, region: 'Midwest' },
          { id: 'IL', name: 'Illinois', col: 6, row: 2, region: 'Midwest' },
          { id: 'IN', name: 'Indiana', col: 7, row: 2, region: 'Midwest' },
          { id: 'OH', name: 'Ohio', col: 8, row: 2, region: 'Midwest' },
          { id: 'PA', name: 'Pennsylvania', col: 9, row: 2, region: 'Northeast' },
          { id: 'NJ', name: 'New Jersey', col: 10, row: 2, region: 'Northeast' },
          { id: 'MA', name: 'Massachusetts', col: 11, row: 2, region: 'Northeast' },
          { id: 'CA', name: 'California', col: 1, row: 3, region: 'West' },
          { id: 'UT', name: 'Utah', col: 2, row: 3, region: 'West' },
          { id: 'CO', name: 'Colorado', col: 3, row: 3, region: 'West' },
          { id: 'NE', name: 'Nebraska', col: 4, row: 3, region: 'Midwest' },
          { id: 'MO', name: 'Missouri', col: 5, row: 3, region: 'Midwest' },
          { id: 'KY', name: 'Kentucky', col: 6, row: 3, region: 'South' },
          { id: 'WV', name: 'West Virginia', col: 7, row: 3, region: 'South' },
          { id: 'MD', name: 'Maryland', col: 8, row: 3, region: 'South' },
          { id: 'DE', name: 'Delaware', col: 9, row: 3, region: 'South' },
          { id: 'RI', name: 'Rhode Island', col: 10, row: 3, region: 'Northeast' },
          { id: 'CT', name: 'Connecticut', col: 11, row: 3, region: 'Northeast' },
          { id: 'AZ', name: 'Arizona', col: 2, row: 4, region: 'West' },
          { id: 'NM', name: 'New Mexico', col: 3, row: 4, region: 'West' },
          { id: 'KS', name: 'Kansas', col: 4, row: 4, region: 'Midwest' },
          { id: 'AR', name: 'Arkansas', col: 5, row: 4, region: 'South' },
          { id: 'TN', name: 'Tennessee', col: 6, row: 4, region: 'South' },
          { id: 'NC', name: 'North Carolina', col: 7, row: 4, region: 'South' },
          { id: 'SC', name: 'South Carolina', col: 8, row: 4, region: 'South' },
          { id: 'DC', name: 'District of Columbia', col: 9, row: 4, region: 'South' },
          { id: 'OK', name: 'Oklahoma', col: 4, row: 5, region: 'South' },
          { id: 'LA', name: 'Louisiana', col: 5, row: 5, region: 'South' },
          { id: 'MS', name: 'Mississippi', col: 6, row: 5, region: 'South' },
          { id: 'AL', name: 'Alabama', col: 7, row: 5, region: 'South' },
          { id: 'GA', name: 'Georgia', col: 8, row: 5, region: 'South' },
          { id: 'HI', name: 'Hawaii', col: 0, row: 6, region: 'West' },
          { id: 'TX', name: 'Texas', col: 4, row: 6, region: 'South' },
          { id: 'FL', name: 'Florida', col: 9, row: 6, region: 'South' },
          { id: 'PR', name: 'Puerto Rico', col: 13, row: 1, region: 'Territories' },
          { id: 'VI', name: 'US Virgin Is.', col: 13, row: 2, region: 'Territories' },
          { id: 'GU', name: 'Guam', col: 13, row: 3, region: 'Territories' },
          { id: 'MP', name: 'N. Marianas', col: 13, row: 4, region: 'Territories' },
          { id: 'AS', name: 'Am. Samoa', col: 13, row: 5, region: 'Territories' }
        ];

        const PRESET_THEMES = {
          runmap: { name: "Runmap Premium", background: "#0f172a", unvisited: "#1e293b", lived: "#8b5cf6", visited: "#10b981", want: "#f59e0b", textVisited: "#ffffff", textUnvisited: "#64748b" },
          emeraldSea: { name: "Emerald Forest", background: "#022c22", unvisited: "#064e3b", lived: "#34d399", visited: "#059669", want: "#a7f3d0", textVisited: "#ffffff", textUnvisited: "#047857" },
          neonCyber: { name: "Cyber Grid", background: "#000000", unvisited: "#18181b", lived: "#ec4899", visited: "#06b6d4", want: "#eab308", textVisited: "#ffffff", textUnvisited: "#52525b" },
          pastelSky: { name: "Cotton Candy", background: "#f8fafc", unvisited: "#e2e8f0", lived: "#c084fc", visited: "#60a5fa", want: "#fbcfe8", textVisited: "#ffffff", textUnvisited: "#94a3b8" },
          highContrast: { name: "High Contrast", background: "#ffffff", unvisited: "#f3f4f6", lived: "#000000", visited: "#1d4ed8", want: "#db2777", textVisited: "#ffffff", textUnvisited: "#9ca3af" }
        };

        const COUNT_THEMES = {
          ocean: { name: "Deep Ocean Blues", shades: ["#f1f5f9", "#93c5fd", "#3b82f6", "#1d4ed8", "#1e3a8a"] },
          sunset: { name: "Volcanic Sunset", shades: ["#fafaf9", "#fdba74", "#f97316", "#ea580c", "#7c2d12"] },
          viridian: { name: "Viridian Greens", shades: ["#f0fdf4", "#86efac", "#22c55e", "#15803d", "#14532d"] },
          berry: { name: "Crimson Berry", shades: ["#fff1f2", "#fda4af", "#f43f5e", "#be123c", "#4c0519"] }
        };

        // MAIN APPLICATION FUNCTION
        function App() {
            const [mapTitle, setMapTitle] = useState("MY US TRAVEL ADVENTURES");
            const [mapSubtitle, setMapSubtitle] = useState("Interactive Statebins Tracker");
            const [states, setStates] = useState({});
            const [selectedStateId, setSelectedStateId] = useState("WA");
            const [mapMode, setMapMode] = useState("status");
            const [themeKey, setThemeKey] = useState("runmap");
            const [countThemeKey, setCountThemeKey] = useState("ocean");
            const [customColors, setCustomColors] = useState({ ...PRESET_THEMES.runmap });
            const [cornerRadius, setCornerRadius] = useState(12);
            const [tileGap, setTileGap] = useState(6);
            const [showSublabel, setShowSublabel] = useState(true);
            const [fontStyle, setFontStyle] = useState("sans");
            const [tileShadow, setTileShadow] = useState(true);
            const [paintTool, setPaintTool] = useState(null);
            const [isDarkMode, setIsDarkMode] = useState(true);
            const [searchQuery, setSearchQuery] = useState("");
            const [regionFilter, setRegionFilter] = useState("all");
            const [toast, setToast] = useState({ show: false, message: '', type: 'info' });

            useEffect(() => {
                const demoStates = {};
                STATES_DATA.forEach(s => {
                    demoStates[s.id] = {
                        status: s.id === 'WA' || s.id === 'NY' ? 'lived' : 
                                ['CA', 'OR', 'NV', 'AZ', 'UT', 'CO', 'TX', 'FL', 'IL', 'MA', 'PA', 'HI', 'PR'].includes(s.id) ? 'visited' :
                                ['MT', 'WY', 'ME', 'AK', 'VI'].includes(s.id) ? 'want' : 'unvisited',
                        count: s.id === 'WA' ? 12 : ['CA', 'NY', 'OR', 'TX', 'PR'].includes(s.id) ? 4 : ['NV', 'AZ', 'FL'].includes(s.id) ? 1 : 0,
                        notes: s.id === 'WA' ? 'Lived here for 5 years.' : '',
                        dateVisited: ''
                    };
                });
                setStates(demoStates);
            }, []);

            useEffect(() => {
                if (themeKey !== "custom" && PRESET_THEMES[themeKey]) {
                    setCustomColors({ ...PRESET_THEMES[themeKey] });
                }
            }, [themeKey]);

            const showToast = (message) => {
                setToast({ show: true, message });
                setTimeout(() => setToast({ show: false, message: '' }), 3000);
            };

            const handleStateClick = (stateId) => {
                setSelectedStateId(stateId);
                if (paintTool) {
                    setStates(prev => {
                        const current = prev[stateId] || { status: 'unvisited', count: 0 };
                        let updated = { ...current };
                        if (mapMode === 'status') {
                            updated.status = paintTool;
                        } else {
                            if (paintTool === 'add') updated.count = current.count + 1;
                            if (paintTool === 'subtract') updated.count = Math.max(0, current.count - 1);
                            if (paintTool === 'clear') updated.count = 0;
                        }
                        return { ...prev, [stateId]: updated };
                    });
                }
            };

            const handleStatusChange = (status) => {
                setStates(prev => ({ ...prev, [selectedStateId]: { ...prev[selectedStateId], status } }));
            };

            const handleCountChange = (count) => {
                setStates(prev => ({ ...prev, [selectedStateId]: { ...prev[selectedStateId], count: Math.max(0, parseInt(count) || 0) } }));
            };

            const bulkAction = (action) => {
                setStates(prev => {
                    const next = { ...prev };
                    STATES_DATA.forEach(s => {
                        if (regionFilter !== 'all' && s.region !== regionFilter) return;
                        if (action === 'all-visited') next[s.id] = { ...next[s.id], status: 'visited', count: 1 };
                        if (action === 'all-unvisited') next[s.id] = { ...next[s.id], status: 'unvisited', count: 0 };
                    });
                    return next;
                });
                showToast("Bulk updates applied!");
            };

            const getStateColor = (stateId) => {
                const sInfo = states[stateId] || { status: 'unvisited', count: 0 };
                if (mapMode === 'status') return customColors[sInfo.status] || customColors.unvisited;
                if (sInfo.count === 0) return customColors.unvisited;
                const palette = COUNT_THEMES[countThemeKey]?.shades || COUNT_THEMES.ocean.shades;
                return sInfo.count <= 2 ? palette[1] : sInfo.count <= 5 ? palette[2] : palette[4];
            };

            const getTextColor = (stateId) => {
                const sInfo = states[stateId] || { status: 'unvisited', count: 0 };
                return sInfo.status === 'unvisited' && mapMode === 'status' ? customColors.textUnvisited : customColors.textVisited;
            };

            const totalLived = STATES_DATA.filter(s => states[s.id]?.status === 'lived').length;
            const totalVisited = STATES_DATA.filter(s => states[s.id]?.status === 'visited').length;
            const totalWant = STATES_DATA.filter(s => states[s.id]?.status === 'want').length;

            const activeStateObj = STATES_DATA.find(s => s.id === selectedStateId);
            const activeStateRecord = states[selectedStateId] || { status: 'unvisited', count: 0, notes: '' };

            return (
                <div className={`min-h-screen p-6 ${isDarkMode ? 'bg-slate-950 text-slate-100' : 'bg-slate-50 text-slate-900'}`}>
                    {toast.show && <div className="fixed bottom-4 right-4 bg-indigo-600 text-white px-4 py-2 rounded-xl z-50 text-xs font-bold">{toast.message}</div>}
                    
                    <header className="max-w-7xl mx-auto flex flex-col sm:flex-row justify-between items-center mb-8 gap-4">
                        <div>
                          <h1 className="text-xl font-black tracking-tight bg-gradient-to-r from-indigo-400 to-emerald-400 bg-clip-text text-transparent">Interactive Been Map for the United States</h1>
                          <p className="text-xs text-slate-400">Interactive Side-Dock Grid Map</p>
                        </div>
                        <div className="flex gap-2">
                          <button onClick={() => setMapMode(mapMode === 'status' ? 'count' : 'status')} className="text-xs font-bold bg-slate-800 px-3 py-1.5 rounded-lg border border-slate-700">Mode: {mapMode.toUpperCase()}</button>
                          <button onClick={() => setIsDarkMode(!isDarkMode)} className="text-xs font-bold bg-slate-800 px-3 py-1.5 rounded-lg border border-slate-700">{isDarkMode ? 'Light Mode' : 'Dark Mode'}</button>
                        </div>
                    </header>

                    <main className="max-w-7xl mx-auto grid grid-cols-1 lg:grid-cols-12 gap-8">
                        {/* CONTROLS */}
                        <div className="lg:col-span-4 space-y-6">
                            <div className="p-4 bg-slate-900/60 rounded-2xl border border-slate-800 space-y-3">
                                <h2 className="text-xs font-black uppercase tracking-wider text-slate-400">Active Node Control</h2>
                                <div className="text-sm font-bold text-indigo-400">{activeStateObj?.name} ({activeStateObj?.id})</div>
                                <div className="grid grid-cols-2 gap-1">
                                    {['lived', 'visited', 'want', 'unvisited'].map(st => (
                                        <button key={st} onClick={() => handleStatusChange(st)} className={`text-[10px] uppercase p-2 font-bold rounded-lg border ${activeStateRecord.status === st ? 'bg-indigo-600 border-indigo-500' : 'bg-slate-950 border-slate-800'}`}>{st}</button>
                                    ))}
                                </div>
                                <div className="pt-2">
                                    <label className="text-[10px] uppercase font-bold text-slate-400 block mb-1">Trip Count</label>
                                    <input type="number" value={activeStateRecord.count || 0} onChange={(e) => handleCountChange(e.target.value)} className="w-full bg-slate-950 border border-slate-800 rounded-lg p-1.5 text-xs text-center font-bold" />
                                </div>
                            </div>

                            <div className="p-4 bg-slate-900/60 rounded-2xl border border-slate-800 space-y-3">
                                <h2 className="text-xs font-black uppercase tracking-wider text-slate-400">Quick Paint Brush</h2>
                                <div className="grid grid-cols-2 gap-1">
                                    {['lived', 'visited', 'want', 'unvisited'].map(st => (
                                        <button key={st} onClick={() => setPaintTool(paintTool === st ? null : st)} className={`text-[10px] uppercase p-2 font-bold rounded-lg border ${paintTool === st ? 'bg-emerald-600 border-emerald-500 text-white' : 'bg-slate-950 border-slate-800 text-slate-400'}`}>{st}</button>
                                    ))}
                                </div>
                            </div>
                        </div>

                        {/* GRAPHIC SVG CANVASES */}
                        <div className="lg:col-span-8 space-y-4">
                            <div className="bg-slate-900 border border-slate-800 p-4 rounded-3xl overflow-x-auto">
                                <svg id="statebins-svg" viewBox="0 0 1400 850" className="w-full h-auto">
                                    <rect width="1400" height="850" fill={customColors.background} rx="20" />
                                    <text x="700" y="55" textAnchor="middle" fill="#ffffff" fontWeight="900" fontSize="32">{mapTitle}</text>
                                    
                                    <line x1="1237" y1="120" x2="1237" y2="720" stroke="#334155" strokeWidth="2.5" strokeDasharray="6,4" />
                                    <text x="1315" y="150" textAnchor="middle" fill="#64748b" fontWeight="900" fontSize="11" letterSpacing="2">TERRITORIES</text>

                                    {STATES_DATA.map(state => {
                                        const stateColor = getStateColor(state.id);
                                        const textColor = getTextColor(state.id);
                                        const x = 12 + state.col * 98;
                                        const y = 120 + state.row * 92;
                                        const isSelected = selectedStateId === state.id;

                                        return (
                                            <g key={state.id} onClick={() => handleStateClick(state.id)} className="cursor-pointer">
                                                <rect x={x + tileGap/2} y={y + tileGap/2} width={98 - tileGap} height={92 - tileGap} rx={cornerRadius} fill={stateColor} stroke={isSelected ? "#ffffff" : "none"} strokeWidth={isSelected ? "3" : "0"} />
                                                <text x={x + 49} y={y + 42} textAnchor="middle" fontWeight="900" fontSize="24" fill={textColor}>{state.id}</text>
                                                {showSublabel && (
                                                    <text x={x + 49} y={y + 66} textAnchor="middle" fontSize="10" fontWeight="700" fill={textColor} opacity="0.7">
                                                        {mapMode === 'count' ? `${states[state.id]?.count || 0} Tr.` : state.name.substring(0,9)}
                                                    </text>
                                                )}
                                            </g>
                                        );
                                    })}
                                </svg>
                            </div>

                            {/* SMALL SCOREBOARD */}
                            <div className="grid grid-cols-3 gap-2">
                                <div className="bg-slate-900/40 p-3 rounded-xl border border-slate-800 text-center"><span className="text-[10px] block font-bold text-slate-500">LIVED IN</span><span className="text-lg font-black">{totalLived}</span></div>
                                <div className="bg-slate-900/40 p-3 rounded-xl border border-slate-800 text-center"><span className="text-[10px] block font-bold text-slate-500">VISITED</span><span className="text-lg font-black">{totalVisited}</span></div>
                                <div className="bg-slate-900/40 p-3 rounded-xl border border-slate-800 text-center"><span className="text-[10px] block font-bold text-slate-500">WANT TO VISIT</span><span className="text-lg font-black">{totalWant}</span></div>
                            </div>
                        </div>
                    </main>
                </div>
            );
        }

        // MOUNT APPARATUS DIRECTLY (Ensures no scoping mismatch crashes root rendering loop)
        const container = document.getElementById('root');
        const root = ReactDOM.createRoot(container);
        root.render(<App />);
    </script>
</body>
</html>
