<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Interactive Been Map for United States</title>
    <!-- Tailwind CSS CDN -->
    <script src="[https://cdn.tailwindcss.com](https://cdn.tailwindcss.com)"></script>

    <script src="[https://unpkg.com/react-dom@18/umd/react-dom.production.min.js](https://unpkg.com/react-dom@18/umd/react-dom.production.min.js)" crossorigin></script>
    <!-- Babel CDN (Compiles JSX in the browser) -->
    <script src="[https://unpkg.com/@babel/standalone/babel.min.js](https://unpkg.com/@babel/standalone/babel.min.js)"></script>
    <!-- Lucide Icons (Required for UI Icons) -->
    <script src="[https://unpkg.com/lucide@latest](https://unpkg.com/lucide@latest)"></script>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        // Inject Lucide Icon variables globally so React can access them directly
        const { 
          Download, Share2, Sparkles, MapPin, Sliders, Calendar, Edit3, Filter, 
          CheckCircle2, Grid, Trash2, Settings, Plus, Minus, Info, Lock, 
          Unlock, BookOpen, Heart, Globe, Award, Search, Check, Copy, 
          ChevronRight, RefreshCw, Sun, Moon 
        } = lucide;

        // Mock Firebase variables to prevent crashes if running locally without environment keys
        window.__app_id = window.__app_id || 'default-app-id';
        window.__firebase_config = window.__firebase_config || '{}';

        import React, { useState, useEffect, useRef } from 'react';
import { 
  Download, 
  Share2, 
  Sparkles, 
  MapPin, 
  Sliders, 
  Calendar, 
  Edit3, 
  Filter, 
  CheckCircle2, 
  Grid, 
  Trash2, 
  Settings, 
  Plus, 
  Minus, 
  Info, 
  Lock, 
  Unlock, 
  BookOpen, 
  Heart,
  Globe,
  Award,
  Search,
  Check,
  Copy,
  ChevronRight,
  RefreshCw,
  Sun,
  Moon
} from 'lucide-react';
import { initializeApp } from 'firebase/app';
import { getAuth, signInAnonymously, signInWithCustomToken, onAuthStateChanged } from 'firebase/auth';
import { getFirestore, doc, setDoc, getDoc, collection } from 'firebase/firestore';

// --- FIREBASE SETUP ---
let db = null;
let auth = null;
let appId = 'travel-statebins';

try {
  if (typeof __firebase_config !== 'undefined') {
    const firebaseConfig = JSON.parse(__firebase_config);
    const app = initializeApp(firebaseConfig);
    auth = getAuth(app);
    db = getFirestore(app);
    appId = typeof __app_id !== 'undefined' ? __app_id : 'travel-statebins';
  }
} catch (e) {
  console.warn("Firebase initialization skipped or failed:", e);
}

// --- CONSTANTS & GRID DATA ---

  },
  emeraldSea: {

    want: "#a7f3d0",

    textUnvisited: "#047857"
  },
  neonCyber: {
    name: "Cyber Grid",
    background: "#000000",
    unvisited: "#18181b",
    lived: "#ec4899",

  },
  pastelSky: {

  },

    visited: "#1d4ed8",

    textVisited: "#ffffff",
    textUnvisited: "#9ca3af"
  }
};

const COUNT_THEMES = {
  ocean: {
    name: "Deep Ocean Blues",
    shades: ["#f1f5f9", "#93c5fd", "#3b82f6", "#1d4ed8", "#1e3a8a"]
  },
  sunset: {
    name: "Volcanic Sunset",
    shades: ["#fafaf9", "#fdba74", "#f97316", "#ea580c", "#7c2d12"]
  },
  viridian: {
    name: "Viridian Greens",
    shades: ["#f0fdf4", "#86efac", "#22c55e", "#15803d", "#14532d"]
  },
  berry: {
    name: "Crimson Berry",
    shades: ["#fff1f2", "#fda4af", "#f43f5e", "#be123c", "#4c0519"]
  }
};

function App() {
  const [user, setUser] = useState(null);
  const [loadingMap, setLoadingMap] = useState(false);
  const [saveLoading, setSaveLoading] = useState(false);
  const [toast, setToast] = useState({ show: false, message: '', type: 'info' });

  // Map state
  const [mapTitle, setMapTitle] = useState("MY US TRAVEL ADVENTURES");
  const [mapSubtitle, setMapSubtitle] = useState("Interactive Statebins Tracker");
  const [states, setStates] = useState({});
  const [selectedStateId, setSelectedStateId] = useState("WA");
  const [mapMode, setMapMode] = useState("status"); // "status" | "count"
  
  // Customization Settings
  const [themeKey, setThemeKey] = useState("runmap");
  const [countThemeKey, setCountThemeKey] = useState("ocean");
  const [customColors, setCustomColors] = useState({ ...PRESET_THEMES.runmap });
  const [cornerRadius, setCornerRadius] = useState(12);
  const [tileGap, setTileGap] = useState(6);
  const [showSublabel, setShowSublabel] = useState(true);
  const [fontStyle, setFontStyle] = useState("sans"); // "sans" | "mono" | "serif"
  const [tileShadow, setTileShadow] = useState(true);
  
  // Paintbrush State
  const [paintTool, setPaintTool] = useState(null); // null (select), 'lived', 'visited', 'want', 'unvisited'
  const [isDarkMode, setIsDarkMode] = useState(true);
  
  // Search & Filters
  const [searchQuery, setSearchQuery] = useState("");
  const [regionFilter, setRegionFilter] = useState("all");

  // Load Initial Demo Data
  useEffect(() => {
    const demoStates = {};
    STATES_DATA.forEach(s => {
      demoStates[s.id] = {
        status: s.id === 'WA' || s.id === 'NY' ? 'lived' : 
                ['CA', 'OR', 'NV', 'AZ', 'UT', 'CO', 'TX', 'FL', 'IL', 'MA', 'PA', 'HI', 'PR'].includes(s.id) ? 'visited' :
                ['MT', 'WY', 'ME', 'AK', 'VI'].includes(s.id) ? 'want' : 'unvisited',
        count: s.id === 'WA' ? 12 : ['CA', 'NY', 'OR', 'TX', 'PR'].includes(s.id) ? 4 : ['NV', 'AZ', 'FL'].includes(s.id) ? 1 : 0,
        notes: s.id === 'WA' ? 'Lived here for 5 years. Beautiful hiking trails.' : s.id === 'PR' ? 'Loved Old San Juan and El Yunque rain forest.' : '',
        dateVisited: s.id === 'WA' ? '2021-06-15' : s.id === 'PR' ? '2023-02-10' : ''
      };
    });
    setStates(demoStates);

    // Watch for shared maps in URL
    const params = new URLSearchParams(window.location.search);
    const sharedMapId = params.get('map');
    if (sharedMapId && db) {
      loadSharedMap(sharedMapId);
    }
  }, []);

  // Theme Syncing
  useEffect(() => {
    if (themeKey !== "custom" && PRESET_THEMES[themeKey]) {
      setCustomColors({ ...PRESET_THEMES[themeKey] });
    }
  }, [themeKey]);

  // Handle Firebase Auth
  useEffect(() => {
    if (!auth) return;
    const initAuth = async () => {
      try {
        if (typeof __initial_auth_token !== 'undefined' && __initial_auth_token) {
          await signInWithCustomToken(auth, __initial_auth_token);
        } else {
          await signInAnonymously(auth);
        }
      } catch (err) {
        console.error("Auth failed:", err);
      }
    };
    initAuth();
    const unsubscribe = onAuthStateChanged(auth, setUser);
    return () => unsubscribe();
  }, []);

  // Show customized toasts
  const showToast = (message, type = 'info') => {
    setToast({ show: true, message, type });
    setTimeout(() => {
      setToast(prev => ({ ...prev, show: false }));
    }, 4000);
  };

  // Shared map loader
  const loadSharedMap = async (mapId) => {
    setLoadingMap(true);
    try {
      const docRef = doc(db, 'artifacts', appId, 'public', 'data', 'travel_maps', mapId);
      const docSnap = await getDoc(docRef);
      if (docSnap.exists()) {
        const data = docSnap.data();
        setMapTitle(data.title || "SHARED TRAVEL MAP");
        setMapSubtitle(data.subtitle || "");
        if (data.states) setStates(data.states);
        if (data.settings) {
          if (data.settings.themeKey) setThemeKey(data.settings.themeKey);
          if (data.settings.cornerRadius !== undefined) setCornerRadius(data.settings.cornerRadius);
          if (data.settings.tileGap !== undefined) setTileGap(data.settings.tileGap);
          if (data.settings.showSublabel !== undefined) setShowSublabel(data.settings.showSublabel);
          if (data.settings.fontStyle) setFontStyle(data.settings.fontStyle);
          if (data.settings.mapMode) setMapMode(data.settings.mapMode);
          if (data.settings.countThemeKey) setCountThemeKey(data.settings.countThemeKey);
          if (data.settings.customColors) setCustomColors(data.settings.customColors);
        }
        showToast("Shared map loaded successfully!", "success");
      } else {
        showToast("Shared map not found.", "error");
      }
    } catch (err) {
      console.error(err);
      showToast("Error loading shared map.", "error");
    } finally {
      setLoadingMap(false);
    }
  };

  // Publish / Share Map
  const publishMap = async () => {
    if (!db || !user) {
      showToast("Storage services unavailable at the moment.", "error");
      return;
    }
    setSaveLoading(true);
    const mapId = crypto.randomUUID().substring(0, 8);
    try {
      const docRef = doc(db, 'artifacts', appId, 'public', 'data', 'travel_maps', mapId);
      await setDoc(docRef, {
        title: mapTitle,
        subtitle: mapSubtitle,
        states,
        settings: {
          themeKey,
          countThemeKey,
          cornerRadius,
          tileGap,
          showSublabel,
          fontStyle,
          mapMode,
          customColors
        },
        creatorId: user.uid,
        createdAt: new Date().toISOString()
      });

      const shareUrl = `${window.location.origin}${window.location.pathname}?map=${mapId}`;
      navigator.clipboard.writeText(shareUrl);
      showToast(`Published! Share link copied to clipboard.`, "success");
      
      window.history.pushState({}, '', `?map=${mapId}`);
    } catch (err) {
      console.error(err);
      showToast("Failed to share map.", "error");
    } finally {
      setSaveLoading(false);
    }
  };

  // Action: State Click / Paint
  const handleStateClick = (stateId) => {
    setSelectedStateId(stateId);
    
    if (paintTool) {
      setStates(prev => {
        const current = prev[stateId] || { status: 'unvisited', count: 0 };
        let updated = { ...current };
        if (mapMode === 'status') {
          updated.status = paintTool;
          if (paintTool === 'lived' && current.count === 0) updated.count = 5;
          if (paintTool === 'visited' && current.count === 0) updated.count = 1;
          if (paintTool === 'unvisited') updated.count = 0;
        } else {
          if (paintTool === 'add') updated.count = current.count + 1;
          if (paintTool === 'subtract') updated.count = Math.max(0, current.count - 1);
          if (paintTool === 'clear') updated.count = 0;
          
          if (updated.count > 0 && current.status === 'unvisited') {
            updated.status = 'visited';
          } else if (updated.count === 0) {
            updated.status = 'unvisited';
          }
        }
        return { ...prev, [stateId]: updated };
      });
    }
  };

  // Manual Detail Editors
  const handleStatusChange = (status) => {
    setStates(prev => {
      const current = prev[selectedStateId] || { status: 'unvisited', count: 0 };
      return {
        ...prev,
        [selectedStateId]: {
          ...current,
          status,
          count: status === 'lived' && current.count === 0 ? 5 : 
                 status === 'visited' && current.count === 0 ? 1 : 
                 status === 'unvisited' ? 0 : current.count
        }
      };
    });
  };

  const handleCountChange = (count) => {
    const safeCount = Math.max(0, parseInt(count) || 0);
    setStates(prev => {
      const current = prev[selectedStateId] || { status: 'unvisited', count: 0 };
      return {
        ...prev,
        [selectedStateId]: {
          ...current,
          count: safeCount,
          status: safeCount > 0 && current.status === 'unvisited' ? 'visited' : 
                  safeCount === 0 ? 'unvisited' : current.status
        }
      };
    });
  };

  const handleNotesChange = (notes) => {
    setStates(prev => {
      const current = prev[selectedStateId] || { status: 'unvisited', count: 0 };
      return { ...prev, [selectedStateId]: { ...current, notes } };
    });
  };

  const handleDateChange = (dateVisited) => {
    setStates(prev => {
      const current = prev[selectedStateId] || { status: 'unvisited', count: 0 };
      return { ...prev, [selectedStateId]: { ...current, dateVisited } };
    });
  };

  // Bulk Selection Operations
  const bulkAction = (action) => {
    setStates(prev => {
      const next = { ...prev };
      STATES_DATA.forEach(s => {
        if (regionFilter !== 'all' && s.region !== regionFilter) return;
        
        const current = next[s.id] || { status: 'unvisited', count: 0 };
        if (action === 'all-visited') {
          next[s.id] = { ...current, status: 'visited', count: Math.max(1, current.count) };
        } else if (action === 'all-unvisited') {
          next[s.id] = { ...current, status: 'unvisited', count: 0, dateVisited: '', notes: '' };
        } else if (action === 'all-want') {
          next[s.id] = { ...current, status: 'want' };
        }
      });
      return next;
    });
    showToast(`Bulk updates applied for ${regionFilter} states!`, "success");
  };

  // Export functions with updated side-dock dimensions (1400x850)
  const exportToSvg = () => {
    const svgElement = document.getElementById('statebins-svg');
    if (!svgElement) return;
    const serializer = new XMLSerializer();
    const svgString = serializer.serializeToString(svgElement);
    const svgBlob = new Blob([svgString], { type: 'image/svg+xml;charset=utf-8' });
    const url = URL.createObjectURL(svgBlob);
    const link = document.createElement('a');
    link.href = url;
    link.download = `${mapTitle.toLowerCase().replace(/\s+/g, '_') || 'travel_map'}.svg`;
    document.body.appendChild(link);
    link.click();
    document.body.removeChild(link);
    showToast("Downloaded map as vector SVG!", "success");
  };

  const exportToPng = () => {
    const svgElement = document.getElementById('statebins-svg');
    if (!svgElement) return;

    const serializer = new XMLSerializer();
    const svgString = serializer.serializeToString(svgElement);

    const canvas = document.createElement('canvas');
    const scale = 2; // high-res
    canvas.width = 1400 * scale;
    canvas.height = 850 * scale;
    const ctx = canvas.getContext('2d');
    ctx.scale(scale, scale);

    const img = new Image();
    const svgBlob = new Blob([svgString], { type: 'image/svg+xml;charset=utf-8' });
    const url = URL.createObjectURL(svgBlob);

    img.onload = () => {
      ctx.fillStyle = customColors.background;
      ctx.fillRect(0, 0, 1400, 850);
      ctx.drawImage(img, 0, 0, 1400, 850);
      URL.revokeObjectURL(url);

      try {
        const pngUrl = canvas.toDataURL('image/png');
        const link = document.createElement('a');
        link.href = pngUrl;
        link.download = `${mapTitle.toLowerCase().replace(/\s+/g, '_') || 'travel_map'}.png`;
        document.body.appendChild(link);
        link.click();
        document.body.removeChild(link);
        showToast("Downloaded high-res travel map!", "success");
      } catch (err) {
        console.error(err);
        showToast("PNG export restricted. Try downloading SVG format.", "error");
      }
    };
    img.src = url;
  };

  const getStateColor = (stateId) => {
    const sInfo = states[stateId] || { status: 'unvisited', count: 0 };
    if (mapMode === 'status') {
      return customColors[sInfo.status] || customColors.unvisited;
    } else {
      const count = sInfo.count || 0;
      const palette = COUNT_THEMES[countThemeKey]?.shades || COUNT_THEMES.ocean.shades;
      if (count === 0) return customColors.unvisited;
      if (count <= 2) return palette[1];
      if (count <= 5) return palette[2];
      if (count <= 10) return palette[3];
      return palette[4];
    }
  };

  const getTextColor = (stateId) => {
    const sInfo = states[stateId] || { status: 'unvisited', count: 0 };
    if (mapMode === 'status') {
      return sInfo.status === 'unvisited' ? customColors.textUnvisited : customColors.textVisited;
    } else {
      return sInfo.count === 0 ? customColors.textUnvisited : "#ffffff";
    }
  };

  // Stats Counters
  const totalLived = STATES_DATA.filter(s => states[s.id]?.status === 'lived').length;
  const totalVisited = STATES_DATA.filter(s => states[s.id]?.status === 'visited').length;
  const totalWant = STATES_DATA.filter(s => states[s.id]?.status === 'want').length;
  const totalStatesTracked = STATES_DATA.filter(s => ['lived', 'visited'].includes(states[s.id]?.status)).length;
  const totalTerritoriesAndStates = STATES_DATA.length; 
  const percentageCompleted = Math.round((totalStatesTracked / totalTerritoriesAndStates) * 100);

  const getRegionCount = (regionName) => {
    const total = STATES_DATA.filter(s => s.region === regionName).length;
    const visited = STATES_DATA.filter(s => s.region === regionName && ['lived', 'visited'].includes(states[s.id]?.status)).length;
    return { visited, total };
  };

  // Travel Achievements
  const achievements = [
    {
      id: 'coastal',
      name: 'Coastal Collector',
      desc: 'Lived or traveled to California (CA) & New York (NY)',
      achieved: ['lived', 'visited'].includes(states['CA']?.status) && ['lived', 'visited'].includes(states['NY']?.status)
    },
    {
      id: 'fourcorners',
      name: 'Four Corners Club',
      desc: 'Traveled to UT, CO, AZ & NM',

                  </text>
                )}

                {/* VERTICAL SEPARATOR LINE BETWEEN US AND TERRITORIES */}
                <line 
                  x1="1237" 
                  y1="120" 
                  x2="1237" 
                  y2="750" 
                  stroke={isDarkMode ? "#334155" : "#cbd5e1"} 
                  strokeWidth="2.5" 
                  strokeDasharray="6,4" 
                />

                {/* VERTICAL SIDE-DOCK HEADER */}
                <text
                  x="1335"
                  y="160"
                  textAnchor="middle"
                  fill={isDarkMode ? "#94a3b8" : "#475569"}
                  fontWeight="900"
                  fontSize="12"
                  letterSpacing="2px"
                >
                  TERRITORIES
                </text>

                {/* STATE & TERRITORY TILES */}
                {STATES_DATA.map(state => {
                  const stateColor = getStateColor(state.id);
                  const textColor = getTextColor(state.id);
                  
                  const x = 12 + state.col * 98;
                  const y = 120 + state.row * 92;
                  const width = 98 - tileGap;
                  const height = 92 - tileGap;
                  
                  const isSelected = selectedStateId === state.id;

                  return (
                    <g
                      key={state.id}
                      onClick={() => handleStateClick(state.id)}
                      className="cursor-pointer transition-all duration-300 hover:brightness-110"
                    >
                      <rect
                        x={x + tileGap / 2}
                        y={y + tileGap / 2}
                        width={width}
                        height={height}
                        rx={cornerRadius}
                        ry={cornerRadius}
                        fill={stateColor}
                        stroke={isSelected ? (isDarkMode ? "#ffffff" : "#4f46e5") : "none"}
                        strokeWidth={isSelected ? "3" : "0"}
                        filter={tileShadow ? "url(#drop-shadow)" : "none"}
                      />

                      <text
                        x={x + 49}
                        y={y + (showSublabel ? 42 : 55)}
                        textAnchor="middle"
                        fontWeight="900"
                        fontSize={showSublabel ? "26" : "32"}
                        fill={textColor}
                      >
                        {state.id}
                      </text>

                      {showSublabel && (
                        <text
                          x={x + 49}
                          y={y + 68}
                          textAnchor="middle"
                          fontSize="10"
                          fontWeight="700"
                          fill={textColor}
                          opacity="0.8"
                        >
                          {mapMode === 'count' 
                            ? `${states[state.id]?.count || 0} Trips` 
                            : state.name.length > 11 ? `${state.name.substring(0, 10)}.` : state.name
                          }
                        </text>
                      )}
                    </g>
                  );
                })}

                {/* SVG MAP LEGEND (Shifted back to y=790 to match layout) */}
                {mapMode === 'status' ? (
                  <g transform="translate(250, 790)">
                    <g transform="translate(0, 0)">
                      <rect width="25" height="25" rx="5" fill={customColors.unvisited} />
                      <text x="35" y="17" fill={isDarkMode ? "#94a3b8" : "#475569"} fontSize="14" fontWeight="bold">Unvisited</text>
                    </g>
                    <g transform="translate(200, 0)">
                      <rect width="25" height="25" rx="5" fill={customColors.want} />
                      <text x="35" y="17" fill={isDarkMode ? "#94a3b8" : "#475569"} fontSize="14" fontWeight="bold">Want to Visit</text>
                    </g>
                    <g transform="translate(430, 0)">
                      <rect width="25" height="25" rx="5" fill={customColors.visited} />
                      <text x="35" y="17" fill={isDarkMode ? "#94a3b8" : "#475569"} fontSize="14" fontWeight="bold">Visited</text>
                    </g>
                    <g transform="translate(630, 0)">
                      <rect width="25" height="25" rx="5" fill={customColors.lived} />
                      <text x="35" y="17" fill={isDarkMode ? "#94a3b8" : "#475569"} fontSize="14" fontWeight="bold">Lived In</text>
                    </g>
                  </g>
                ) : (
                  <g transform="translate(320, 790)">
                    <text x="-15" y="17" fill={isDarkMode ? "#94a3b8" : "#475569"} fontSize="14" fontWeight="bold" textAnchor="end">0 trips</text>
                    <rect x="0" y="2" width="40" height="20" rx="4" fill={customColors.unvisited} />
                    
                    <g transform="translate(50, 0)">
                      <rect x="0" y="2" width="120" height="20" rx="4" fill="url(#gradient-legend-shades)" />
                      <text x="60" y="38" fill={isDarkMode ? "#94a3b8" : "#475569"} fontSize="11" fontWeight="bold" textAnchor="middle">Activity Count / Trip Scale</text>
                      
                      <defs>
                        <linearGradient id="gradient-legend-shades" x1="0%" y1="0%" x2="100%" y2="0%">
                          <stop offset="0%" stopColor={COUNT_THEMES[countThemeKey]?.shades[1]} />
                          <stop offset="50%" stopColor={COUNT_THEMES[countThemeKey]?.shades[2]} />
                          <stop offset="100%" stopColor={COUNT_THEMES[countThemeKey]?.shades[4]} />
                        </linearGradient>
                      </defs>
                    </g>

                    <text x="185" y="17" fill={isDarkMode ? "#94a3b8" : "#475569"} fontSize="14" fontWeight="bold">10+ trips</text>
                  </g>
                )}
              </svg>
            </div>

            {/* Quick Map Presets */}
            <div className="flex flex-wrap items-center justify-between gap-3 pt-6 mt-6 border-t border-slate-800">
              <span className="text-xs font-bold text-slate-400">Map Routing Presets:</span>
              <div className="flex flex-wrap gap-2">
                <button
                  onClick={() => {
                    const next = { ...states };
                    ['WA', 'OR', 'CA', 'NV', 'AZ', 'UT', 'CO', 'HI', 'AK', 'GU', 'AS', 'MP'].forEach(id => {
                      next[id] = { status: 'visited', count: 3 };
                    });
                    setStates(next);
                    showToast("West Coast & Pacific Basin preset selected!", "success");
                  }}
                  className={`px-3 py-1.5 rounded-lg text-xs font-bold border transition-all ${
                    isDarkMode ? 'border-slate-800 bg-slate-950 text-slate-300 hover:bg-slate-800' : 'border-slate-200 bg-slate-50 text-slate-700 hover:bg-slate-100'
                  }`}
                >
                  🌴 Pacific Basin Explorer
                </button>
                <button
                  onClick={() => {
                    const next = { ...states };
                    ['ME', 'VT', 'NH', 'MA', 'RI', 'CT', 'NY', 'NJ', 'PA', 'PR', 'VI'].forEach(id => {
                      next[id] = { status: 'visited', count: 5 };
                    });
                    setStates(next);
                    showToast("Northeast & Caribbean preset selected!", "success");
                  }}
                  className={`px-3 py-1.5 rounded-lg text-xs font-bold border transition-all ${
                    isDarkMode ? 'border-slate-800 bg-slate-950 text-slate-300 hover:bg-slate-800' : 'border-slate-200 bg-slate-50 text-slate-700 hover:bg-slate-100'
                  }`}
                >
                  🍁 East Coast & Caribbean
                </button>
                <button
                  onClick={() => {
                    bulkAction('all-unvisited');
                  }}
                  className="px-3 py-1.5 rounded-lg text-xs font-bold border border-red-500/30 bg-red-500/10 text-red-400 hover:bg-red-500/20"
                >
                  🗑️ Reset All
                </button>
              </div>
            </div>

          </div>

          {/* DYNAMIC PROGRESS STATS */}
          <div className="grid grid-cols-1 md:grid-cols-4 gap-4">
            
            <div className={`p-5 rounded-2xl border ${isDarkMode ? 'bg-slate-900 border-slate-800' : 'bg-white border-slate-200'} shadow-md flex items-center gap-4`}>
              <div className="p-3 rounded-xl bg-purple-500/10 text-purple-400">
                <MapPin size={24} />
              </div>
              <div>
                <span className="text-[10px] uppercase tracking-wider text-slate-400 block font-bold">Lived In</span>
                <span className="text-2xl font-black">{totalLived} <span className="text-xs text-slate-500">places</span></span>
              </div>
            </div>

            <div className={`p-5 rounded-2xl border ${isDarkMode ? 'bg-slate-900 border-slate-800' : 'bg-white border-slate-200'} shadow-md flex items-center gap-4`}>
              <div className="p-3 rounded-xl bg-emerald-500/10 text-emerald-400">
                <CheckCircle2 size={24} />
              </div>
              <div>
                <span className="text-[10px] uppercase tracking-wider text-slate-400 block font-bold">Visited</span>
                <span className="text-2xl font-black">{totalVisited} <span className="text-xs text-slate-500">places</span></span>
              </div>
            </div>

            <div className={`p-5 rounded-2xl border ${isDarkMode ? 'bg-slate-900 border-slate-800' : 'bg-white border-slate-200'} shadow-md flex items-center gap-4`}>
              <div className="p-3 rounded-xl bg-amber-500/10 text-amber-400">
                <Heart size={24} />
              </div>
              <div>
                <span className="text-[10px] uppercase tracking-wider text-slate-400 block font-bold">Want to Visit</span>
                <span className="text-2xl font-black">{totalWant} <span className="text-xs text-slate-500">places</span></span>
              </div>
            </div>

            <div className={`p-5 rounded-2xl border ${isDarkMode ? 'bg-slate-900 border-slate-800' : 'bg-white border-slate-200'} shadow-md`}>
              <div className="flex justify-between items-center mb-1">
                <span className="text-[10px] uppercase tracking-wider text-slate-400 font-bold">Overall US Map Complete</span>
                <span className="text-sm font-black text-indigo-400">{percentageCompleted}%</span>
              </div>
              <div className="w-full bg-slate-800 rounded-full h-3.5 overflow-hidden">
                <div 
                  className="bg-gradient-to-r from-indigo-500 via-purple-500 to-emerald-500 h-full rounded-full transition-all duration-500"
                  style={{ width: `${percentageCompleted}%` }}
                />
              </div>
            </div>

          </div>

          {/* DUAL WORKSPACE PANEL: ACTIVE STATE LOG / REGIONAL STATS & ACHIEVEMENTS */}
          <div className="grid grid-cols-1 md:grid-cols-2 gap-6">
            
            {/* ACTIVE STATE LOG & JOURNAL */}
            <div className={`p-6 rounded-2xl border ${isDarkMode ? 'bg-slate-900 border-slate-800' : 'bg-white border-slate-200'} shadow-md`}>
              <div className="flex items-center justify-between pb-4 border-b border-slate-800 mb-4">
                <div className="flex items-center gap-2">
                  <div className="w-7 h-7 rounded-lg bg-indigo-500 text-white font-bold flex items-center justify-center text-xs">
                    {activeStateObj?.id}
                  </div>
                  <div>
                    <h3 className="font-extrabold text-base">{activeStateObj?.name}</h3>
                    <p className="text-[10px] text-slate-400 font-bold">Region: {activeStateObj?.region}</p>
                  </div>
                </div>
                <span className={`text-[10px] uppercase font-extrabold px-2.5 py-1 rounded-full ${
                  activeStateRecord.status === 'lived' ? 'bg-purple-500/10 text-purple-400 border border-purple-500/30' :
                  activeStateRecord.status === 'visited' ? 'bg-emerald-500/10 text-emerald-400 border border-emerald-500/30' :
                  activeStateRecord.status === 'want' ? 'bg-amber-500/10 text-amber-400 border border-amber-500/30' :
                  'bg-slate-500/10 text-slate-400 border border-slate-500/30'
                }`}>
                  {activeStateRecord.status || 'unvisited'}
                </span>
              </div>

              {/* Status selectors */}
              <div className="space-y-4">
                <div>
                  <span className="text-xs text-slate-400 font-semibold block mb-2">Set Status</span>
                  <div className="grid grid-cols-4 gap-1.5">
                    {['lived', 'visited', 'want', 'unvisited'].map(st => (
                      <button
                        key={st}
                        onClick={() => handleStatusChange(st)}
                        className={`py-2 text-[10px] font-bold rounded-xl border transition-all ${
                          activeStateRecord.status === st
                            ? 'border-indigo-500 bg-indigo-500/10 text-indigo-400'
                            : isDarkMode ? 'border-slate-800 hover:bg-slate-800 text-slate-400' : 'border-slate-200 hover:bg-slate-100 text-slate-600'
                        }`}
                      >
                        {st.toUpperCase()}
                      </button>
                    ))}
                  </div>
                </div>

                {/* Date & Counts */}
                <div className="grid grid-cols-2 gap-4">
                  <div>
                    <span className="text-xs text-slate-400 font-semibold block mb-1.5">Trip/Activity Count</span>
                    <div className="flex items-center gap-1">
                      <button
                        onClick={() => handleCountChange(activeStateRecord.count - 1)}
                        className="p-1.5 rounded-lg bg-slate-800 hover:bg-slate-700 text-slate-200"
                      >
                        <Minus size={14} />
                      </button>
                      <input
                        type="number"
                        value={activeStateRecord.count || 0}
                        onChange={(e) => handleCountChange(e.target.value)}
                        className={`w-full text-center text-xs font-bold py-1.5 rounded-lg border ${
                          isDarkMode ? 'bg-slate-950 border-slate-800' : 'bg-slate-50 border-slate-200 text-slate-900'
                        }`}
                      />
                      <button
                        onClick={() => handleCountChange(activeStateRecord.count + 1)}
                        className="p-1.5 rounded-lg bg-slate-800 hover:bg-slate-700 text-slate-200"
                      >
                        <Plus size={14} />
                      </button>
                    </div>
                  </div>

                  <div>
                    <span className="text-xs text-slate-400 font-semibold block mb-1.5">Date Visited</span>
                    <div className="relative">
                      <input
                        type="date"
                        value={activeStateRecord.dateVisited || ""}
                        onChange={(e) => handleDateChange(e.target.value)}
                        className={`w-full text-xs font-semibold px-2 py-1.5 rounded-lg border ${
                          isDarkMode ? 'bg-slate-950 border-slate-800 text-white' : 'bg-slate-50 border-slate-200 text-slate-900'
                        }`}
                      />
                    </div>
                  </div>
                </div>

                {/* Custom Notes */}
                <div>
                  <span className="text-xs text-slate-400 font-semibold block mb-1.5">My Travel Notes & Memories</span>
                  <textarea
                    rows="3"
                    value={activeStateRecord.notes || ""}
                    onChange={(e) => handleNotesChange(e.target.value)}
                    placeholder="Describe your favorite places, hikes, campgrounds, or local restaurants..."
                    className={`w-full text-xs px-3 py-2 rounded-xl border focus:outline-none focus:ring-1 focus:ring-indigo-500 ${
                      isDarkMode ? 'bg-slate-950 border-slate-800 text-slate-200' : 'bg-slate-50 border-slate-200 text-slate-900'
                    }`}
                  />
                </div>
              </div>

            </div>

            {/* ACHIEVEMENTS & MILESTONES */}
            <div className={`p-6 rounded-2xl border ${isDarkMode ? 'bg-slate-900 border-slate-800' : 'bg-white border-slate-200'} shadow-md flex flex-col justify-between`}>
              <div>
                <div className="flex items-center gap-2 mb-4">
                  <Award size={18} className="text-amber-400 animate-pulse" />
                  <h3 className="font-bold text-base">Travel Milestones</h3>
                </div>

                <div className="space-y-3 max-h-[220px] overflow-y-auto pr-1">
                  {achievements.map(ach => (
                    <div
                      key={ach.id}
                      className={`p-3 rounded-xl border flex items-start gap-3 transition-all ${
                        ach.achieved 
                          ? 'border-emerald-500/30 bg-emerald-500/10' 
                          : isDarkMode ? 'border-slate-800 bg-slate-950/40 text-slate-400' : 'border-slate-200 bg-slate-50 text-slate-500'
                      }`}
                    >
                      <div className={`mt-0.5 p-1 rounded-md ${ach.achieved ? 'bg-emerald-500 text-white' : 'bg-slate-800 text-slate-500'}`}>
                        <Check size={12} />
                      </div>
                      <div>
                        <h4 className={`text-xs font-extrabold ${ach.achieved ? 'text-slate-100' : 'text-slate-500'}`}>
                          {ach.name}
                        </h4>
                        <p className="text-[10px] leading-tight text-slate-400">{ach.desc}</p>
                      </div>
                    </div>
                  ))}
                </div>
              </div>

              {/* Regions complete counts list */}
              <div className="grid grid-cols-2 md:grid-cols-3 gap-2 mt-4 pt-4 border-t border-slate-800/60">
                {['West', 'Midwest', 'South', 'Northeast', 'Territories'].map(reg => {
                  const { visited, total } = getRegionCount(reg);
                  return (
                    <div key={reg} className="flex justify-between items-center text-[11px]">
                      <span className="text-slate-400 font-semibold">{reg === 'Territories' ? 'Territories' : reg}</span>
                      <span className="font-bold text-slate-200">{visited}/{total}</span>
                    </div>
                  );
                })}
              </div>

            </div>

          </div>

          {/* CHECKLIST & BATCH CONTROLLER */}
          <div className={`p-6 rounded-2xl border ${isDarkMode ? 'bg-slate-900 border-slate-800' : 'bg-white border-slate-200'} shadow-md`}>
            
            <div className="flex flex-col md:flex-row justify-between items-start md:items-center gap-4 mb-5">
              
              <div className="flex items-center gap-2">
                <Filter size={18} className="text-indigo-400" />
                <h3 className="font-bold text-base">Checklist & Bulk Actions</h3>
              </div>

              {/* Bulk actions based on region filters */}
              <div className="flex items-center gap-1.5 flex-wrap">
                <select
                  value={regionFilter}
                  onChange={(e) => setRegionFilter(e.target.value)}
                  className={`text-xs font-bold py-1.5 px-3 rounded-lg border ${
                    isDarkMode ? 'bg-slate-950 border-slate-800 text-white' : 'bg-slate-50 border-slate-200 text-slate-900'
                  }`}
                >
                  <option value="all">All Regions</option>
                  <option value="West">West Coast</option>
                  <option value="Midwest">Midwest</option>
                  <option value="South">The South</option>
                  <option value="Northeast">Northeast</option>
                  <option value="Territories">US Territories</option>
                </select>

                <button
                  onClick={() => bulkAction('all-visited')}
                  className="px-3 py-1.5 rounded-lg text-xs font-bold border border-emerald-500/30 bg-emerald-500/10 text-emerald-400"
                >
                  Mark Visited
                </button>
                <button
                  onClick={() => bulkAction('all-unvisited')}
                  className="px-3 py-1.5 rounded-lg text-xs font-bold border border-slate-500/30 bg-slate-500/10 text-slate-400"
                >
                  Clear Region
                </button>
              </div>

            </div>

            {/* Filter Search */}
            <div className="relative mb-4">
              <Search className="absolute left-3.5 top-1/2 -translate-y-1/2 text-slate-500" size={16} />
              <input
                type="text"
                placeholder="Search US states or territories..."
                value={searchQuery}
                onChange={(e) => setSearchQuery(e.target.value)}
                className={`w-full text-xs pl-10 pr-4 py-2.5 rounded-xl border focus:outline-none focus:ring-1 focus:ring-indigo-500 ${
                  isDarkMode ? 'bg-slate-950 border-slate-800 text-slate-300' : 'bg-slate-50 border-slate-200 text-slate-900'
                }`}
              />
            </div>

            {/* Checklist Grid */}
            <div className="grid grid-cols-2 sm:grid-cols-3 md:grid-cols-4 lg:grid-cols-5 gap-3 max-h-[300px] overflow-y-auto pr-2">
              {filteredStatesChecklist.map(s => {
                const sRec = states[s.id] || { status: 'unvisited', count: 0 };
                const isSelected = selectedStateId === s.id;
                
                return (
                  <div
                    key={s.id}
                    onClick={() => setSelectedStateId(s.id)}
                    className={`p-3 rounded-xl border cursor-pointer transition-all flex items-center justify-between gap-1.5 ${
                      isSelected 
                        ? 'border-indigo-500 bg-indigo-500/10' 
                        : isDarkMode ? 'border-slate-800 bg-slate-950/40 hover:bg-slate-800' : 'border-slate-200 bg-slate-50 hover:bg-slate-100'
                    }`}
                  >
                    <div className="flex flex-col">
                      <span className="text-xs font-black">{s.id}</span>
                      <span className="text-[9px] text-slate-400 font-bold leading-none truncate w-20">{s.name}</span>
                    </div>

                    <div className="flex items-center gap-1.5">
                      <button
                        onClick={(e) => {
                          e.stopPropagation();
                          const toggleNext = sRec.status === 'unvisited' ? 'visited' : 
                                             sRec.status === 'visited' ? 'lived' : 'unvisited';
                          setStates(prev => ({
                            ...prev,
                            [s.id]: {
                              ...prev[s.id],
                              status: toggleNext,
                              count: toggleNext === 'visited' ? 1 : toggleNext === 'lived' ? 5 : 0
                            }
                          }));
                        }}
                        className={`w-6 h-6 rounded-lg flex items-center justify-center border transition-all ${
                          sRec.status === 'lived' ? 'bg-purple-600 border-purple-500 text-white' :
                          sRec.status === 'visited' ? 'bg-emerald-600 border-emerald-500 text-white' :
                          sRec.status === 'want' ? 'bg-amber-500 border-amber-400 text-white' :
                          'border-slate-800 bg-slate-900 text-slate-600'
                        }`}
                        title="Click to toggle status"
                      >
                        {sRec.status === 'lived' ? 'L' : sRec.status === 'visited' ? 'V' : sRec.status === 'want' ? 'W' : ''}
                      </button>
                    </div>
                  </div>
                );
              })}
            </div>

          </div>

        </section>

      </main>

      {/* --- FOOTER --- */}
      <footer className={`border-t py-8 px-6 text-center text-xs mt-12 ${isDarkMode ? 'border-slate-800 bg-slate-950 text-slate-500' : 'border-slate-200 bg-slate-100 text-slate-600'}`}>
        <p className="font-semibold">StateBins Travel Studio &copy; 2026. Built with React, Tailwind and HTML5 vector standards.</p>
        <p className="text-[10px] text-slate-400 mt-1">
          Designed after custom statebins R package representations. Supports continuous scales for trip counts, standard states, and side-docked US territories.
        </p>
      </footer>

    </div>
  );
}

        // Render React directly to the DOM
        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
